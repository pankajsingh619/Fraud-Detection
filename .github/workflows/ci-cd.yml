name: GuardianEye CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        # Install pytest for runner
        pip install pytest

    - name: Run Unit Tests
      run: |
        # Run pytest if test files exist
        if [ -d "tests" ]; then
          pytest
        else
          echo "No test directory found. Skipping unit tests."
        fi

  build-frontend:
    needs: test
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: 'landing-page/package-lock.json'

    - name: Install Frontend Dependencies
      run: |
        cd landing-page
        npm ci

    - name: Build Next.js Production Bundle
      run: |
        cd landing-page
        npm run build
